<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Buku - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-200 min-h-screen font-sans bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.2),rgba(255,255,255,0))]"
  >
    <nav
      class="sticky top-0 z-50 bg-slate-900/70 backdrop-blur-xl border-b border-slate-700/50 shadow-lg"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/30"
            >
              P
            </div>
            <h1 class="text-xl font-bold text-white tracking-wide">
              Perpus<span class="text-blue-500">App</span>
            </h1>
          </div>
          <div class="hidden md:flex items-center gap-8">
            <a
              href="#"
              class="text-blue-400 font-bold border-b-2 border-blue-500 pb-1"
              >Beranda</a
            >
            <a
              href="views/user/loans.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Peminjamanku</a
            >
            <a
              href="views/user/history.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Riwayat</a
            >
            <a
              href="views/user/fines.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Tagihan</a
            >
          </div>
          <div class="hidden md:flex items-center gap-5">
            <div class="text-right">
              <p id="memberName" class="text-sm font-semibold text-slate-100">
                Memuat...
              </p>
              <p
                id="memberCode"
                class="text-[10px] text-slate-400 uppercase font-mono tracking-wider"
              >
                Member
              </p>
            </div>
            <button
              id="btnLogout"
              class="bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl text-sm font-bold transition-all border border-red-500/20"
            >
              Keluar
            </button>
          </div>
          <div class="md:hidden flex items-center">
            <button id="mobileMenuBtn" class="text-slate-300">
              <svg
                class="w-7 h-7"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div
        id="mobileMenu"
        class="hidden md:hidden bg-slate-900/95 backdrop-blur-xl border-b border-slate-700"
      >
        <div class="px-4 pt-2 pb-6 space-y-2">
          <a
            href="#"
            class="block px-4 py-3 rounded-xl bg-blue-600/20 text-blue-400 font-bold"
            >Beranda</a
          >
          <a
            href="views/user/loans.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Peminjamanku</a
          >
          <a
            href="views/user/history.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Riwayat</a
          >
          <a
            href="views/user/fines.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Tagihan</a
          >
          <button
            id="btnMobileLogout"
            class="w-full text-left px-4 py-3 rounded-xl text-red-400 font-bold border border-red-500/20 mt-4"
          >
            Keluar
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 sm:p-8">
      <header class="mb-10">
        <h2 class="text-4xl font-extrabold text-white mb-4 tracking-tight">
          Eksplorasi <span class="text-blue-500">Katalog</span>
        </h2>
        <div class="relative max-w-2xl group">
          <div
            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-500 transition-colors"
          >
            <svg
              class="h-5 w-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              ></path>
            </svg>
          </div>
          <input
            type="text"
            id="searchInput"
            placeholder="Cari berdasarkan judul, penulis, atau kategori..."
            class="w-full pl-12 pr-4 py-4 bg-slate-900/40 border border-slate-700 rounded-2xl text-white outline-none focus:ring-2 focus:ring-blue-500/50 focus:bg-slate-900/80 transition-all shadow-2xl"
          />
        </div>
      </header>

      <div
        id="booksContainer"
        class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-6"
      ></div>
      <div
        id="paginationContainer"
        class="flex justify-center items-center gap-2 mt-16 mb-8 flex-wrap"
      ></div>
    </main>

    <script src="middleware/middleware.js"></script>
    <script src="Services/apiService.js"></script>
    <script src="Services/authService.js"></script>
    <script src="Services/bookService.js"></script>

    <script>
      $(document).ready(function () {
        $("#mobileMenuBtn").on("click", () =>
          $("#mobileMenu").slideToggle("fast"),
        );
        if (typeof Middleware !== "undefined") Middleware.checkAuth();
        if (typeof AuthService !== "undefined") {
          AuthService.getProfile().done((res) => {
            if (res.success) {
              $("#memberName").text(res.data.user.name);
              $("#memberCode").text(res.data.user.memberCode || "Member");
            }
          });
        }
        $("#btnLogout, #btnMobileLogout").on("click", () => {
          if (confirm("Yakin ingin keluar?")) {
            AuthService.clearSession();
            window.location.href = "views/auth/login.html";
          }
        });

        let searchTimer,
          currentSearchQuery = "",
          currentPage = 1;

        function fetchBooks(searchQuery = "", page = 1) {
          currentSearchQuery = searchQuery;
          currentPage = page;
          $("#booksContainer").html(
            `<div class="col-span-full flex justify-center py-20"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div></div>`,
          );
          BookService.getBooks({ page: page, limit: 10, search: searchQuery })
            .done((res) => {
              if (res.data?.books?.length > 0) {
                renderBooks(res.data.books);
                if (res.pagination) renderPagination(res.pagination);
              } else {
                $("#booksContainer").html(
                  '<p class="text-slate-500 col-span-full text-center py-10">Buku tidak ditemukan.</p>',
                );
                $("#paginationContainer").empty();
              }
            })
            .fail(() =>
              $("#booksContainer").html(
                '<p class="text-red-400 col-span-full text-center py-10">Gagal memuat server.</p>',
              ),
            );
        }

        function renderBooks(books) {
          const $container = $("#booksContainer");
          $container.empty();
          books.forEach((b) => {
            let cover =
              b.coverImage && b.coverImage !== "string"
                ? b.coverImage
                : `https://ui-avatars.com/api/?name=${b.title.charAt(0)}&background=1e293b&color=3b82f6&size=200`;
            $container.append(`
              <div onclick="window.location.href='views/user/detail.html?id=${b._id}'" class="bg-white/5 border border-white/10 rounded-3xl p-4 hover:bg-white/10 transition-all cursor-pointer group flex flex-col h-full shadow-lg">
                <div class="relative aspect-[3/4] overflow-hidden rounded-2xl mb-4 shadow-2xl">
                  <img src="${cover}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                  <div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4"><span class="text-white text-xs font-bold bg-blue-600 px-3 py-1 rounded-lg shadow-lg">Lihat Detail</span></div>
                </div>
                <h3 class="font-bold text-white text-sm line-clamp-2 mb-1 group-hover:text-blue-400 transition-colors">${b.title}</h3>
                <p class="text-[11px] text-slate-400 mb-3">${b.author}</p>
                <div class="mt-auto flex justify-between items-center pt-3 border-t border-white/5">
                  <span class="text-[10px] font-bold text-slate-500 uppercase">${b.category || "Umum"}</span>
                  <span class="text-[10px] font-bold ${b.availableCopies > 0 ? "text-emerald-400" : "text-red-400"}">${b.availableCopies > 0 ? "TERSEDIA" : "HABIS"}</span>
                </div>
              </div>
            `);
          });
        }

        function renderPagination(pagination) {
          const $container = $("#paginationContainer");
          $container.empty();
          const { page, totalPages, hasNextPage, hasPrevPage } = pagination;
          if (totalPages <= 1) return;
          let html = `<button data-page="${page - 1}" class="page-btn px-5 py-2 bg-slate-900 border border-slate-700 rounded-xl transition-all ${!hasPrevPage ? "opacity-30 pointer-events-none" : "hover:bg-slate-800"}">Prev</button>`;
          for (
            let i = Math.max(1, page - 2);
            i <= Math.min(totalPages, page + 2);
            i++
          ) {
            html += `<button data-page="${i}" class="page-btn w-10 h-10 border rounded-xl font-bold transition-all ${i === page ? "bg-blue-600 text-white border-blue-400 shadow-lg shadow-blue-600/30" : "bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800"}">${i}</button>`;
          }
          html += `<button data-page="${page + 1}" class="page-btn px-5 py-2 bg-slate-900 border border-slate-700 rounded-xl transition-all ${!hasNextPage ? "opacity-30 pointer-events-none" : "hover:bg-slate-800"}">Next</button>`;
          $container.append(html);
        }

        fetchBooks();
        $("#searchInput").on("keyup", function () {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => fetchBooks($(this).val(), 1), 500);
        });
        $(document).on("click", ".page-btn", function () {
          fetchBooks(currentSearchQuery, $(this).data("page"));
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    </script>
  </body>
</html>
