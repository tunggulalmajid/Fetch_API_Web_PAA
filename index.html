<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beranda Member - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-200 min-h-screen font-sans bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.15),rgba(255,255,255,0))]"
  >
    <!-- Navbar (Glassmorphism) -->
    <nav
      class="sticky top-0 z-50 bg-slate-900/70 backdrop-blur-lg border-b border-slate-700/50 shadow-lg"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Logo & Brand -->
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/30"
            >
              P
            </div>
            <h1 class="text-xl font-bold text-white tracking-wide">
              Perpus<span class="text-blue-500">App</span>
            </h1>
          </div>

          <!-- Desktop Menu Options -->
          <div class="hidden md:flex items-center gap-8">
            <a href="#" class="text-blue-400 font-medium transition-colors"
              >Beranda</a
            >
            <a
              href="views/user/loans.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Peminjamanku</a
            >
            <a
              href="views/user/history.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Riwayat</a
            >
          </div>

          <!-- Desktop User Profile & Logout -->
          <div class="hidden md:flex items-center gap-5">
            <a href="views/user/profile.html" class="text-right group">
              <p
                id="memberName"
                class="text-sm font-semibold text-slate-100 group-hover:text-blue-400 transition-colors"
              >
                Memuat...
              </p>
              <p
                id="memberCode"
                class="text-xs text-slate-400 uppercase group-hover:text-slate-300"
              >
                Lihat Profil
              </p>
            </a>
            <button
              id="btnLogout"
              class="bg-red-500/10 text-red-400 border border-red-500/20 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-500 hover:text-white transition-all"
            >
              Logout
            </button>
          </div>

          <!-- Mobile Menu Button (Hamburger) -->
          <div class="md:hidden flex items-center">
            <button
              id="mobileMenuBtn"
              class="text-slate-300 hover:text-white focus:outline-none"
            >
              <svg
                class="w-7 h-7"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Mobile Menu Dropdown -->
      <div
        id="mobileMenu"
        class="hidden md:hidden bg-slate-800/95 backdrop-blur-xl border-b border-slate-700"
      >
        <div class="px-4 pt-2 pb-4 space-y-1 sm:px-3">
          <a
            href="#"
            class="block px-3 py-2 rounded-md text-base font-medium text-blue-400 bg-slate-700/50"
            >Beranda</a
          >
          <a
            href="views/user/loans.html"
            class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700"
            >Peminjamanku</a
          >
          <a
            href="views/user/history.html"
            class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700"
            >Riwayat</a
          >

          <div class="mt-4 pt-4 border-t border-slate-600">
            <div class="flex items-center px-3 mb-4">
              <div>
                <p
                  id="mobileMemberName"
                  class="text-base font-medium text-white"
                >
                  Memuat...
                </p>
                <a
                  href="views/user/profile.html"
                  class="text-sm text-blue-400 hover:underline"
                  >Lihat Profil</a
                >
              </div>
            </div>
            <button
              id="btnMobileLogout"
              class="w-full text-left block px-3 py-2 rounded-md text-base font-medium text-red-400 hover:text-white hover:bg-red-500/20"
            >
              Logout
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6 sm:p-8">
      <header class="mb-10">
        <h2 class="text-3xl md:text-4xl font-bold text-white mb-2">
          Katalog Buku Digital
        </h2>
        <p class="text-slate-400 text-sm md:text-base">
          Temukan buku favorit Anda dan mulai meminjam secara praktis.
        </p>
      </header>

      <!-- Search Bar -->
      <div class="mb-10 max-w-2xl relative">
        <div
          class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
        >
          <svg
            class="h-5 w-5 text-slate-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            ></path>
          </svg>
        </div>
        <input
          type="text"
          id="searchInput"
          placeholder="Cari judul buku, penulis, atau kategori..."
          class="w-full pl-11 pr-5 py-3.5 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none shadow-inner backdrop-blur-sm transition-all"
        />
      </div>

      <!-- Book Catalog Container -->
      <div
        id="bookContainer"
        class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"
      >
        <!-- Placeholder Loading awal akan ditimpa oleh jQuery -->
      </div>

      <!-- Pagination Container -->
      <div
        id="paginationContainer"
        class="flex justify-center items-end gap-2 mt-12 mb-8 flex-wrap"
      >
        <!-- Tombol paginasi akan dirender di sini oleh jQuery -->
      </div>
    </main>

    <!-- Scripts: Pastikan path ini sesuai dengan struktur folder Anda -->
    <script src="middleware/middleware.js"></script>
    <script src="Services/apiService.js"></script>
    <script src="Services/authService.js"></script>
    <script src="Services/bookService.js"></script>

    <script>
      $(document).ready(function () {
        // --- 1. LOGIKA UI & NAVBAR ---
        $("#mobileMenuBtn").on("click", function () {
          $("#mobileMenu").slideToggle("fast");
        });

        // --- 2. LOGIKA AUTHENTIKASI ---
        if (typeof Middleware !== "undefined" && Middleware.checkAuth()) {
          const role = localStorage.getItem("user_role");
          if (role === "admin") {
            window.location.href = "views/admin/dashboard.html";
            return;
          }

          if (typeof AuthService !== "undefined") {
            AuthService.getProfile()
              .done(function (res) {
                if (res.success) {
                  $("#memberName, #mobileMemberName").text(res.data.user.name);
                  $("#memberCode").text(res.data.user.memberCode || "Member");
                }
              })
              .fail(function (err) {
                if (err.status === 401) {
                  AuthService.clearSession();
                  window.location.href = "views/auth/login.html";
                }
              });
          }
        }

        $("#btnLogout, #btnMobileLogout").on("click", function () {
          if (confirm("Yakin ingin keluar dari akun?")) {
            if (typeof AuthService !== "undefined") AuthService.clearSession();
            window.location.href = "views/auth/login.html";
          }
        });

        // --- 3. LOGIKA KATALOG BUKU & PAGINASI ---
        let searchTimer;
        let currentSearchQuery = "";

        // Fungsi utama memanggil API
        function fetchBooks(searchQuery = "", page = 1) {
          currentSearchQuery = searchQuery;

          const params = {
            page: page,
            limit: 10,
            search: searchQuery,
          };

          // Tampilkan loading & kosongkan kontainer
          $("#bookContainer").html(`
            <div class="col-span-full flex justify-center py-12">
              <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            </div>
          `);
          $("#paginationContainer").empty();

          if (typeof BookService !== "undefined") {
            BookService.getBooks(params)
              .done(function (res) {
                if (res.success) {
                  renderBooks(res);
                  renderPagination(res.pagination);
                } else {
                  $("#bookContainer").html(
                    '<p class="text-red-400 col-span-full text-center py-10">Gagal memuat katalog buku.</p>',
                  );
                }
              })
              .fail(function (err) {
                console.error("Gagal mengambil buku", err);
                $("#bookContainer").html(
                  '<p class="text-red-400 col-span-full text-center py-10">Terjadi kesalahan pada server.</p>',
                );
              });
          } else {
            console.warn("BookService belum tersedia.");
          }
        }

        // Fungsi render HTML Buku
        function renderBooks(response) {
          const $container = $("#bookContainer");
          $container.empty();

          const books = response.data.books;

          if (!books || books.length === 0) {
            $container.html(
              '<p class="text-slate-400 col-span-full text-center py-10">Buku tidak ditemukan.</p>',
            );
            return;
          }

          books.forEach((book) => {
            // Penanganan Gambar
            let coverImage = book.coverImage;
            if (
              !coverImage ||
              coverImage === "string" ||
              coverImage === "----" ||
              coverImage === ""
            ) {
              const initials =
                book.title
                  .split(" ")
                  .map((n) => n[0])
                  .join("")
                  .substring(0, 2)
                  .toUpperCase() || "BK";
              coverImage = `https://ui-avatars.com/api/?name=${initials}&background=1e293b&color=94a3b8&size=300&font-size=0.33`;
            }

            // Ketersediaan & Kategori
            const isAvailable = book.availableCopies > 0;
            const categoryLabel = book.category
              ? book.category.charAt(0).toUpperCase() + book.category.slice(1)
              : "Umum";

            // PERUBAHAN DI SINI: Tag <div> terluar diubah menjadi <a>
            const cardHtml = `
              <a href="views/user/detail.html?id=${book._id}" class="bg-white/5 border border-white/10 rounded-2xl p-4 backdrop-blur-sm hover:bg-white/10 transition-all group flex flex-col h-full cursor-pointer hover:shadow-xl hover:shadow-blue-900/20">
                <div class="h-48 sm:h-56 bg-slate-800 rounded-xl mb-4 overflow-hidden relative shrink-0">
                  <img src="${coverImage}" alt="${book.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                  
                  ${
                    isAvailable
                      ? '<span class="absolute top-2 right-2 bg-emerald-500 text-white text-xs px-2.5 py-1 rounded-md font-bold shadow-lg shadow-emerald-500/30">Tersedia</span>'
                      : '<span class="absolute top-2 right-2 bg-red-500 text-white text-xs px-2.5 py-1 rounded-md font-bold shadow-lg shadow-red-500/30">Habis</span>'
                  }
                  
                  <span class="absolute bottom-2 left-2 bg-slate-900/80 backdrop-blur-md text-slate-300 border border-slate-700 text-xs px-2 py-0.5 rounded-md">
                    ${categoryLabel}
                  </span>
                </div>
                
                <div class="flex flex-col flex-grow">
                  <h3 class="text-lg font-bold text-white line-clamp-2 mb-1 leading-tight" title="${book.title}">${book.title}</h3>
                  <p class="text-blue-400 text-sm mb-1 truncate">${book.author || "Penulis Tidak Diketahui"}</p>
                  
                  <div class="flex justify-between items-center text-xs text-slate-500 mb-4 mt-auto pt-2 border-t border-slate-700/50">
                    <span>${book.publishYear || "-"}</span>
                    <span>${book.availableCopies}/${book.totalCopies} Salinan</span>
                  </div>
                </div>
                
                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-xl transition-all shadow-lg shadow-blue-600/20 active:scale-95 ${!isAvailable ? "opacity-50 cursor-not-allowed saturate-0 hover:bg-blue-600" : ""}" ${!isAvailable ? "disabled" : ""}>
                  ${isAvailable ? "Lihat Detail" : "Stok Habis"}
                </button>
              </a>
            `;
            $container.append(cardHtml);
          });
        }

        // Fungsi render Tombol Paginasi
        function renderPagination(pagination) {
          const $container = $("#paginationContainer");
          $container.empty();

          if (!pagination || pagination.totalPages <= 1) return;

          const { page, totalPages, hasNextPage, hasPrevPage } = pagination;
          let html = "";

          // Tombol Prev
          html += `<button data-page="${page - 1}" class="page-btn px-4 py-2 bg-slate-900/50 border border-slate-700 rounded-xl transition-all font-medium ${!hasPrevPage ? "opacity-50 cursor-not-allowed pointer-events-none text-slate-500" : "text-slate-300 hover:text-white hover:bg-slate-700 active:scale-95"}">Prev</button>`;

          let startPage = Math.max(1, page - 2);
          let endPage = Math.min(totalPages, page + 2);

          if (startPage > 1) {
            html += `<button data-page="1" class="page-btn w-10 h-10 flex items-center justify-center bg-slate-900/50 border border-slate-700 rounded-xl text-slate-300 hover:text-white hover:bg-slate-700 transition-all font-medium">1</button>`;
            if (startPage > 2)
              html += `<span class="text-slate-500 tracking-widest px-1">...</span>`;
          }

          for (let i = startPage; i <= endPage; i++) {
            const activeClass =
              i === page
                ? "bg-blue-600 text-white border-blue-500 shadow-lg shadow-blue-500/30"
                : "bg-slate-900/50 border-slate-700 text-slate-300 hover:text-white hover:bg-slate-700";
            html += `<button data-page="${i}" class="page-btn w-10 h-10 flex items-center justify-center border rounded-xl transition-all font-medium active:scale-95 ${activeClass}">${i}</button>`;
          }

          if (endPage < totalPages) {
            if (endPage < totalPages - 1)
              html += `<span class="text-slate-500 tracking-widest px-1">...</span>`;
            html += `<button data-page="${totalPages}" class="page-btn w-10 h-10 flex items-center justify-center bg-slate-900/50 border border-slate-700 rounded-xl text-slate-300 hover:text-white hover:bg-slate-700 transition-all font-medium">${totalPages}</button>`;
          }

          // Tombol Next
          html += `<button data-page="${page + 1}" class="page-btn px-4 py-2 bg-slate-900/50 border border-slate-700 rounded-xl transition-all font-medium ${!hasNextPage ? "opacity-50 cursor-not-allowed pointer-events-none text-slate-500" : "text-slate-300 hover:text-white hover:bg-slate-700 active:scale-95"}">Next</button>`;

          $container.append(html);
        }

        // --- 4. EVENT LISTENERS ---

        // Inisialisasi awal
        fetchBooks();

        // Fitur Pencarian dengan Debounce
        $("#searchInput").on("keyup", function () {
          clearTimeout(searchTimer);
          const value = $(this).val();

          searchTimer = setTimeout(() => {
            fetchBooks(value, 1);
          }, 500);
        });

        // Event saat tombol pagination ditekan
        $(document).on("click", ".page-btn", function () {
          const targetPage = $(this).data("page");

          fetchBooks(currentSearchQuery, targetPage);

          // Auto-scroll halus ke atas saat pindah halaman
          $("html, body").animate(
            {
              scrollTop: $("header").offset().top - 20,
            },
            400,
          );
        });
      });
    </script>
  </body>
</html>
