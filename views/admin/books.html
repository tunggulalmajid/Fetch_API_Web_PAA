<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelola Buku - Admin PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-200 h-screen overflow-hidden font-sans bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.15),rgba(255,255,255,0))] flex"
  >
    <aside
      class="w-64 bg-slate-900/80 backdrop-blur-xl border-r border-slate-700/50 flex flex-col hidden md:flex transition-all duration-300 z-20"
    >
      <div class="h-16 flex items-center px-6 border-b border-slate-700/50">
        <div class="flex items-center gap-3">
          <div
            class="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center text-white font-bold"
          >
            A
          </div>
          <h1 class="text-xl font-bold text-white">
            Admin<span class="text-emerald-500">Panel</span>
          </h1>
        </div>
      </div>
      <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <a
          href="dashboard.html"
          class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition-all"
          ><span>📊</span> Dashboard</a
        >
        <a
          href="#"
          class="flex items-center gap-3 px-4 py-3 bg-emerald-600/20 text-emerald-400 rounded-xl font-bold border border-emerald-500/30 transition-all"
          ><span>📚</span> Kelola Buku</a
        >
        <a
          href="members.html"
          class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition-all"
          ><span>👥</span> Anggota</a
        >
        <a
          href="loans.html"
          class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition-all"
          ><span>🔄</span> Peminjaman</a
        >
        <a
          href="fines.html"
          class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl font-medium transition-all"
          ><span>💰</span> Keuangan & Denda</a
        >
      </nav>
      <div class="p-4 border-t border-slate-700/50">
        <button
          id="btnLogout"
          class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white rounded-xl font-bold transition-all border border-red-500/20"
        >
          <span>🚪</span> Logout
        </button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
      <header
        class="h-16 bg-slate-900/50 backdrop-blur-md border-b border-slate-700/50 flex items-center justify-between px-6 z-10"
      >
        <div class="flex items-center gap-4">
          <button
            id="mobileMenuBtn"
            class="md:hidden text-slate-300 hover:text-white"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              ></path>
            </svg>
          </button>
          <h2 class="text-lg font-bold text-white hidden sm:block">
            Manajemen Data Buku
          </h2>
        </div>
      </header>
      <div
        id="mobileMenu"
        class="hidden md:hidden absolute top-16 left-0 w-full bg-slate-800/95 backdrop-blur-xl border-b border-slate-700 z-50 shadow-2xl"
      >
        <nav class="px-4 pt-2 pb-4 space-y-1 sm:px-3">
          <a
            href="dashboard.html"
            class="block px-3 py-2 text-slate-300 hover:text-white hover:bg-slate-700 rounded-md font-medium"
            >📊 Dashboard</a
          >
          <a
            href="#"
            class="block px-3 py-2 bg-emerald-600/20 text-emerald-400 rounded-md font-bold"
            >📚 Kelola Buku</a
          >
          <a
            href="members.html"
            class="block px-3 py-2 text-slate-300 hover:text-white hover:bg-slate-700 rounded-md font-medium"
            >👥 Anggota</a
          >
          <a
            href="loans.html"
            class="block px-3 py-2 text-slate-300 hover:text-white hover:bg-slate-700 rounded-md font-medium"
            >🔄 Peminjaman</a
          >
          <a
            href="fines.html"
            class="block px-3 py-2 text-slate-300 hover:text-white hover:bg-slate-700 rounded-md font-medium"
            >💰 Keuangan & Denda</a
          >
        </nav>
      </div>

      <main class="flex-1 overflow-y-auto p-6 md:p-8">
        <div
          class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6"
        >
          <div class="relative w-full md:w-96">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <svg
                class="h-5 w-5 text-slate-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                ></path>
              </svg>
            </div>
            <input
              type="text"
              id="searchInput"
              placeholder="Cari judul, penulis, atau ISBN..."
              class="w-full pl-10 pr-4 py-2 bg-slate-900/50 border border-slate-700 rounded-xl text-white outline-none transition-all"
            />
          </div>
          <button
            id="btnOpenAddModal"
            class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-6 rounded-xl transition-all flex items-center justify-center gap-2"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              ></path>
            </svg>
            Tambah Buku
          </button>
        </div>

        <div
          class="bg-white/5 border border-white/10 rounded-3xl shadow-2xl backdrop-blur-xl overflow-hidden"
        >
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
              <thead>
                <tr
                  class="bg-slate-900/60 border-b border-slate-700/50 text-slate-400 text-xs uppercase tracking-wider"
                >
                  <th class="px-6 py-4 font-semibold">Judul & ID Buku</th>
                  <th class="px-6 py-4 font-semibold">Kategori</th>
                  <th class="px-6 py-4 font-semibold">Stok</th>
                  <th class="px-6 py-4 font-semibold">Status</th>
                  <th class="px-6 py-4 font-semibold text-center">Aksi</th>
                </tr>
              </thead>
              <tbody
                id="booksTableBody"
                class="text-sm divide-y divide-slate-700/50"
              >
                <tr>
                  <td
                    colspan="5"
                    class="px-6 py-12 text-center text-emerald-400"
                  >
                    Memuat data buku...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div
          id="paginationContainer"
          class="flex justify-center items-end gap-2 mt-8 mb-4 flex-wrap"
        ></div>
      </main>
    </div>

    <!-- MODAL FORM BUKU -->
    <div
      id="bookModal"
      class="fixed inset-0 z-50 hidden flex items-center justify-center overflow-y-auto pt-10 pb-10"
    >
      <div
        class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm"
        id="bookModalBackdrop"
      ></div>
      <div
        class="relative bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl w-full max-w-4xl mx-4 transform scale-95 opacity-0 transition-all duration-300 my-auto"
        id="bookModalBox"
      >
        <div
          class="flex justify-between items-center p-6 border-b border-slate-700/50"
        >
          <div>
            <h3 id="modalTitle" class="text-2xl font-bold text-white">
              Tambah Buku Baru
            </h3>
            <p
              id="modalBookId"
              class="text-xs font-mono text-emerald-400 mt-1 hidden"
            ></p>
            <!-- Menampilkan ID di Modal -->
          </div>
          <button id="btnCancelBookTop" class="text-slate-400 hover:text-white">
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>
        <form id="formBook" class="p-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1"
                  >Judul Buku <span class="text-red-500">*</span></label
                ><input
                  type="text"
                  id="bTitle"
                  class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  required
                />
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1"
                  >Penulis <span class="text-red-500">*</span></label
                ><input
                  type="text"
                  id="bAuthor"
                  class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  required
                />
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-semibold text-slate-300 mb-1"
                    >Penerbit</label
                  ><input
                    type="text"
                    id="bPublisher"
                    class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-slate-300 mb-1"
                    >Tahun Terbit</label
                  ><input
                    type="number"
                    id="bYear"
                    class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  />
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-semibold text-slate-300 mb-1"
                    >Kategori</label
                  ><input
                    type="text"
                    id="bCategory"
                    class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-slate-300 mb-1"
                    >ISBN</label
                  ><input
                    type="text"
                    id="bIsbn"
                    class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  />
                </div>
              </div>
            </div>
            <div class="space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-semibold text-slate-300 mb-1"
                    >Total Salinan <span class="text-red-500">*</span></label
                  ><input
                    type="number"
                    id="bCopies"
                    min="1"
                    value="1"
                    class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                    required
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-slate-300 mb-1"
                    >Status</label
                  ><select
                    id="bIsActive"
                    class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  >
                    <option value="true">🟢 Aktif</option>
                    <option value="false">🔴 Nonaktif</option>
                  </select>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-semibold text-slate-300 mb-1"
                    >Lokasi Rak</label
                  ><input
                    type="text"
                    id="bLocation"
                    class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-slate-300 mb-1"
                    >Jumlah Halaman</label
                  ><input
                    type="number"
                    id="bPages"
                    class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                  />
                </div>
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1"
                  >URL Cover</label
                ><input
                  type="url"
                  id="bCover"
                  class="w-full px-4 py-2.5 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                />
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1"
                  >Sinopsis</label
                ><textarea
                  id="bDesc"
                  rows="2"
                  class="w-full px-4 py-2 bg-slate-800/50 border border-slate-600 rounded-xl text-white outline-none"
                ></textarea>
              </div>
            </div>
          </div>
          <div
            class="flex gap-3 justify-end mt-8 pt-6 border-t border-slate-700/50"
          >
            <button
              type="button"
              id="btnCancelBook"
              class="px-5 py-2.5 rounded-xl font-bold text-slate-300 hover:text-white hover:bg-slate-800 transition-colors"
            >
              Batal
            </button>
            <button
              type="submit"
              id="btnSaveBook"
              class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-6 rounded-xl transition-all"
            >
              Simpan Buku
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script src="../../Services/bookService.js"></script>

    <script>
      $(document).ready(function () {
        if (typeof Middleware !== "undefined") Middleware.checkAuth();
        if (localStorage.getItem("user_role") !== "admin") {
          window.location.href = "../../index.html";
          return;
        }
        $("#mobileMenuBtn").on("click", () =>
          $("#mobileMenu").slideToggle("fast"),
        );
        $("#btnLogout").on("click", function () {
          if (confirm("Keluar dari panel admin?")) {
            AuthService.clearSession();
            window.location.href = "../auth/login.html";
          }
        });

        let searchTimer,
          currentSearchQuery = "",
          currentPage = 1,
          isEditMode = false,
          currentEditId = null;

        function fetchBooks(searchQuery = "", page = 1) {
          currentSearchQuery = searchQuery;
          currentPage = page;
          $("#booksTableBody").html(
            `<tr><td colspan="5" class="px-6 py-12 text-center text-emerald-400">Memuat data...</td></tr>`,
          );
          BookService.getBooks({ page: page, limit: 10, search: searchQuery })
            .done((res) => {
              if (res.data && res.data.books) {
                renderBooksTable(res.data.books);
                if (res.pagination) renderPagination(res.pagination);
              } else {
                $("#booksTableBody").html(
                  '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">Kosong.</td></tr>',
                );
              }
            })
            .fail(() =>
              $("#booksTableBody").html(
                '<tr><td colspan="5" class="px-6 py-8 text-center text-red-400">Gagal.</td></tr>',
              ),
            );
        }

        function renderBooksTable(books) {
          const $tbody = $("#booksTableBody");
          $tbody.empty();
          if (books.length === 0)
            return $tbody.html(
              '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">Kosong.</td></tr>',
            );
          books.forEach((book) => {
            let coverImage =
              book.coverImage && book.coverImage !== "string"
                ? book.coverImage
                : `https://ui-avatars.com/api/?name=${book.title.charAt(0)}&background=1e293b&color=94a3b8&size=100`;
            const isActiveHtml = book.isActive
              ? `<span class="bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded text-xs font-bold">Aktif</span>`
              : `<span class="bg-red-500/20 text-red-400 px-2 py-1 rounded text-xs font-bold">Nonaktif</span>`;
            $tbody.append(`
              <tr class="hover:bg-slate-800/50 transition-colors group">
                <td class="px-6 py-4">
                  <div class="flex items-center gap-4">
                    <img src="${coverImage}" class="w-10 h-14 object-cover rounded shadow">
                    <div>
                      <p class="font-bold text-white max-w-[200px] truncate">${book.title}</p>
                      <p class="text-xs text-slate-400">${book.author}</p>
                      <!-- TAMPILAN ID BUKU -->
                      <p class="text-[10px] text-emerald-500/80 font-mono mt-1 bg-emerald-500/10 inline-block px-1.5 py-0.5 rounded">ID: ${book._id}</p>
                    </div>
                  </div>
                </td>
                <td class="px-6 py-4 text-slate-300 capitalize">${book.category || "-"}</td>
                <td class="px-6 py-4"><span class="font-bold ${book.availableCopies > 0 ? "text-emerald-400" : "text-red-400"}">${book.availableCopies || 0}</span> <span class="text-xs text-slate-500">/ ${book.totalCopies || 0}</span></td>
                <td class="px-6 py-4">${isActiveHtml}</td>
                <td class="px-6 py-4 text-center"><div class="flex justify-center gap-2"><button class="btn-edit p-2 bg-blue-500/10 text-blue-400 rounded-lg hover:bg-blue-500 hover:text-white" data-id="${book._id}">✏️</button><button class="btn-delete p-2 bg-red-500/10 text-red-400 rounded-lg hover:bg-red-500 hover:text-white" data-id="${book._id}" data-title="${book.title}">🗑️</button></div></td>
              </tr>
            `);
          });
        }

        function renderPagination(pagination) {
          const $container = $("#paginationContainer");
          $container.empty();
          if (!pagination || pagination.totalPages <= 1) return;
          const { page, totalPages, hasNextPage, hasPrevPage } = pagination;
          let html = `<button data-page="${page - 1}" class="page-btn px-4 py-2 border rounded-xl ${page === 1 ? "opacity-50 pointer-events-none" : "bg-slate-900/50 hover:bg-slate-700"}">Prev</button>`;
          let startPage = Math.max(1, page - 2);
          let endPage = Math.min(totalPages, page + 2);
          if (startPage > 1)
            html += `<button data-page="1" class="page-btn w-10 h-10 border border-slate-700 rounded-xl bg-slate-900/50 text-slate-300">1</button><span class="text-slate-500 px-1 flex items-end mb-2 tracking-widest">...</span>`;
          for (let i = startPage; i <= endPage; i++) {
            const activeClass =
              i === page
                ? "bg-emerald-600 text-white border-emerald-500 shadow-lg shadow-emerald-500/30"
                : "bg-slate-900/50 border-slate-700 text-slate-300 hover:bg-slate-700";
            html += `<button data-page="${i}" class="page-btn w-10 h-10 border rounded-xl font-bold transition-all flex items-center justify-center ${activeClass}">${i}</button>`;
          }
          if (endPage < totalPages)
            html += `<span class="text-slate-500 px-1 flex items-end mb-2 tracking-widest">...</span><button data-page="${totalPages}" class="page-btn w-10 h-10 border border-slate-700 rounded-xl bg-slate-900/50 text-slate-300">${totalPages}</button>`;
          html += `<button data-page="${page + 1}" class="page-btn px-4 py-2 border rounded-xl ${page === totalPages ? "opacity-50 pointer-events-none" : "bg-slate-900/50 hover:bg-slate-700"}">Next</button>`;
          $container.append(html);
        }

        fetchBooks();
        $("#searchInput").on("keyup", function () {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => fetchBooks($(this).val(), 1), 500);
        });
        $(document).on("click", ".page-btn", function () {
          fetchBooks(currentSearchQuery, $(this).data("page"));
        });

        function openModal() {
          $("#bookModal").removeClass("hidden");
          setTimeout(
            () =>
              $("#bookModalBox")
                .removeClass("scale-95 opacity-0")
                .addClass("scale-100 opacity-100"),
            10,
          );
        }
        function closeModal() {
          $("#bookModalBox")
            .removeClass("scale-100 opacity-100")
            .addClass("scale-95 opacity-0");
          setTimeout(() => $("#bookModal").addClass("hidden"), 300);
        }
        $("#btnCancelBook, #btnCancelBookTop, #bookModalBackdrop").on(
          "click",
          closeModal,
        );

        $("#btnOpenAddModal").on("click", function () {
          isEditMode = false;
          currentEditId = null;
          $("#formBook")[0].reset();
          $("#modalTitle").text("Tambah Buku Baru");
          $("#modalBookId").addClass("hidden");
          $("#btnSaveBook").html("Simpan Buku");
          openModal();
        });

        $(document).on("click", ".btn-edit", function () {
          const id = $(this).data("id");
          const $btn = $(this);
          $btn.html("⏳");
          BookService.getBookById(id)
            .done((res) => {
              if (res.data && res.data.book) {
                const b = res.data.book;
                isEditMode = true;
                currentEditId = b._id;
                $("#bTitle").val(b.title);
                $("#bAuthor").val(b.author);
                $("#bPublisher").val(b.publisher);
                $("#bYear").val(b.publishYear);
                $("#bCategory").val(b.category);
                $("#bIsbn").val(b.isbn);
                $("#bCopies").val(b.totalCopies);
                $("#bPages").val(b.pages);
                $("#bLocation").val(b.location);
                $("#bCover").val(b.coverImage !== "string" ? b.coverImage : "");
                $("#bDesc").val(
                  b.description !== "string" ? b.description : "",
                );
                $("#bIsActive").val(b.isActive ? "true" : "false");
                $("#modalTitle").text("Edit Data Buku");
                $("#modalBookId")
                  .removeClass("hidden")
                  .text("Book ID: " + b._id); // TAMPILKAN ID DI MODAL
                $("#btnSaveBook").html("Update Buku");
                openModal();
              }
            })
            .always(() => $btn.html("✏️"));
        });

        $(document).on("click", ".btn-delete", function () {
          if (confirm(`Yakin hapus buku "${$(this).data("title")}"?`)) {
            BookService.deleteBook($(this).data("id"))
              .done(() => fetchBooks(currentSearchQuery, currentPage))
              .fail(() => alert("Gagal hapus"));
          }
        });

        $("#formBook").on("submit", function (e) {
          e.preventDefault();
          const $btn = $("#btnSaveBook");
          $btn.prop("disabled", true).html("Proses...");
          const payload = {
            title: $("#bTitle").val(),
            author: $("#bAuthor").val(),
            publisher: $("#bPublisher").val(),
            isbn: $("#bIsbn").val(),
            category: $("#bCategory").val().toLowerCase(),
            description: $("#bDesc").val(),
            location: $("#bLocation").val(),
            coverImage: $("#bCover").val(),
            totalCopies: parseInt($("#bCopies").val()) || 1,
            publishYear: parseInt($("#bYear").val()) || null,
            pages: parseInt($("#bPages").val()) || null,
            isActive: $("#bIsActive").val() === "true",
          };
          const req = isEditMode
            ? BookService.updateBook(currentEditId, payload)
            : BookService.createBook(payload);
          req
            .done(() => {
              alert("Sukses!");
              closeModal();
              fetchBooks(currentSearchQuery, currentPage);
            })
            .always(() => $btn.prop("disabled", false).html("Simpan"));
        });
      });
    </script>
  </body>
</html>
