<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <!-- Background gambar perpustakaan dengan tema gelap -->
  <body
    class="relative flex items-center justify-center min-h-screen bg-gray-900 bg-[url('https://images.unsplash.com/photo-1568667256549-094345857637?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80')] bg-cover bg-center bg-fixed"
  >
    <!-- Overlay gelap transparan untuk meningkatkan keterbacaan -->
    <div class="absolute inset-0 bg-gray-950/75 backdrop-blur-sm z-0"></div>

    <!-- Container Card (Glassmorphism Effect) -->
    <div
      class="relative z-10 w-full max-w-md mx-4 p-8 sm:p-10 bg-white/10 border border-white/20 rounded-2xl shadow-2xl backdrop-blur-lg"
    >
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white tracking-wide mb-2">Login</h1>
        <p class="text-gray-300 text-sm">Sistem Peminjaman Buku Perpustakaan</p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-5">
        <div>
          <input
            type="email"
            id="email"
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="Email Address"
            required
          />
        </div>
        <div>
          <input
            type="password"
            id="password"
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="Password"
            required
          />
        </div>
        <button
          type="submit"
          id="btnLogin"
          class="w-full py-3 mt-2 text-white bg-blue-600 rounded-xl font-bold hover:bg-blue-700 focus:ring-4 focus:ring-blue-500/50 shadow-lg shadow-blue-600/30 transition-all transform hover:-translate-y-0.5"
        >
          Masuk
        </button>
      </form>

      <!-- Footer -->
      <p class="mt-6 text-center text-sm text-gray-300">
        Belum punya akun?
        <a
          href="register.html"
          class="text-blue-400 font-bold hover:text-blue-300 hover:underline transition-colors"
        >
          Daftar
        </a>
      </p>
    </div>

    <!-- Scripts -->
    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script>
      $(document).ready(function () {
        // Asumsi middleware dan service tersedia
        if (typeof Middleware !== "undefined") Middleware.guestOnly();

        $("#loginForm").on("submit", function (e) {
          e.preventDefault();
          const $btn = $("#btnLogin")
            .text("Memproses...")
            .prop("disabled", true)
            .removeClass("hover:-translate-y-0.5 hover:bg-blue-700")
            .addClass("opacity-75 cursor-not-allowed");

          const data = {
            email: $("#email").val(),
            password: $("#password").val(),
          };

          if (typeof AuthService !== "undefined") {
            AuthService.login(data)
              .done(function (res) {
                if (res.success) {
                  AuthService.saveSession(res.data);
                  Middleware.redirectFromAuth();
                }
              })
              .fail(function (err) {
                alert(
                  "Login Gagal: " +
                    (err.responseJSON?.message || "Email atau Password salah"),
                );
                // Reset button state
                $btn
                  .text("Masuk")
                  .prop("disabled", false)
                  .addClass("hover:-translate-y-0.5 hover:bg-blue-700")
                  .removeClass("opacity-75 cursor-not-allowed");
              });
          } else {
            console.warn("AuthService belum dimuat.");
            setTimeout(() => {
              $btn
                .text("Masuk")
                .prop("disabled", false)
                .addClass("hover:-translate-y-0.5 hover:bg-blue-700")
                .removeClass("opacity-75 cursor-not-allowed");
            }, 1000);
          }
        });
      });
    </script>
  </body>
</html>
