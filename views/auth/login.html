<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <h1 class="text-3xl font-bold text-blue-600 text-center mb-8">Login</h1>
      <form id="loginForm" class="space-y-4">
        <input
          type="email"
          id="email"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="password"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Password"
          required
        />
        <button
          type="submit"
          id="btnLogin"
          class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition"
        >
          Masuk
        </button>
      </form>
      <p class="mt-6 text-center text-sm text-slate-600">
        Belum punya akun?
        <a href="register.html" class="text-blue-600 font-bold hover:underline"
          >Daftar</a
        >
      </p>
    </div>

    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script>
      $(document).ready(function () {
        Middleware.guestOnly();
        $("#loginForm").on("submit", function (e) {
          e.preventDefault();
          const $btn = $("#btnLogin")
            .text("Memproses...")
            .prop("disabled", true);
          const data = {
            email: $("#email").val(),
            password: $("#password").val(),
          };

          // Di dalam $.ajax().done() pada login.html
          AuthService.login(data)
            .done(function (res) {
              if (res.success) {
                // Mengambil data sesuai struktur response yang kamu kirim
                // Simpan ke localStorage
                AuthService.saveSession(res.data);
                // Redirect berdasarkan role
                Middleware.redirectFromAuth();
              }
            })
            .fail(function (err) {
              alert(
                "Login Gagal: " +
                  (err.responseJSON?.message || "Email atau Password salah"),
              );
            });
        });
      });
    </script>
  </body>
</html>
