<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Daftar - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div
      class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border-t-4 border-emerald-500"
    >
      <h1 class="text-3xl font-bold text-emerald-600 text-center mb-8">
        Daftar Anggota
      </h1>
      <form id="registerForm" class="space-y-4">
        <input
          type="text"
          id="name"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none"
          placeholder="Nama Lengkap"
          required
        />
        <input
          type="email"
          id="email"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="password"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none"
          placeholder="Password"
          required
        />
        <button
          type="submit"
          id="btnReg"
          class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold hover:bg-emerald-700 transition"
        >
          Daftar Akun
        </button>
      </form>
    </div>

    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script>
      $(document).ready(function () {
        Middleware.guestOnly();
        $("#registerForm").on("submit", function (e) {
          e.preventDefault();
          const data = {
            name: $("#name").val(),
            email: $("#email").val(),
            password: $("#password").val(),
          };
          AuthService.register(data).done(() => {
            alert("Berhasil! Silakan Login.");
            window.location.href = "login.html";
          });
        });
      });
    </script>
  </body>
</html>
