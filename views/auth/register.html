<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <!-- Background gambar perpustakaan yang sama dengan login -->
  <body
    class="relative flex items-center justify-center min-h-screen bg-gray-900 bg-[url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80')] bg-cover bg-center bg-fixed"
  >
    <!-- Overlay gelap transparan -->
    <div class="absolute inset-0 bg-gray-950/75 backdrop-blur-sm z-0"></div>

    <!-- Container Card (Glassmorphism Effect) -->
    <div
      class="relative z-10 w-full max-w-md mx-4 p-8 sm:p-10 bg-white/10 border border-white/20 rounded-2xl shadow-2xl backdrop-blur-lg"
    >
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white tracking-wide mb-2">
          Daftar Akun
        </h1>
        <p class="text-gray-300 text-sm">Daftarkan Akunmu</p>
      </div>

      <!-- Form -->
      <form id="registerForm" class="space-y-5">
        <div>
          <input
            type="text"
            id="name"
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="Nama Lengkap"
            required
          />
        </div>
        <div>
          <input
            type="email"
            id="email"
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="Email Address"
            required
          />
        </div>
        <div>
          <input
            type="password"
            id="password"
            class="w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="Password"
            required
          />
        </div>
        <button
          type="submit"
          id="btnReg"
          class="w-full py-3 mt-2 text-white bg-blue-600 rounded-xl font-bold hover:bg-blue-700 focus:ring-4 focus:ring-blue-500/50 shadow-lg shadow-blue-600/30 transition-all transform hover:-translate-y-0.5"
        >
          Daftar Sekarang
        </button>
      </form>

      <!-- Footer -->
      <p class="mt-6 text-center text-sm text-gray-300">
        Sudah punya akun?
        <a
          href="login.html"
          class="text-blue-400 font-bold hover:text-blue-300 hover:underline transition-colors"
        >
          Masuk
        </a>
      </p>
    </div>

    <!-- Scripts -->
    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script>
      $(document).ready(function () {
        if (typeof Middleware !== "undefined") Middleware.guestOnly();

        $("#registerForm").on("submit", function (e) {
          e.preventDefault();

          // Ubah state tombol saat memproses
          const $btn = $("#btnReg")
            .text("Memproses...")
            .prop("disabled", true)
            .removeClass("hover:-translate-y-0.5 hover:bg-blue-700")
            .addClass("opacity-75 cursor-not-allowed");

          const data = {
            name: $("#name").val(),
            email: $("#email").val(),
            password: $("#password").val(),
          };

          if (typeof AuthService !== "undefined") {
            AuthService.register(data)
              .done(() => {
                alert("Pendaftaran Berhasil! Silakan Login.");
                window.location.href = "login.html";
              })
              .fail((err) => {
                alert(
                  "Pendaftaran Gagal: " +
                    (err.responseJSON?.message ||
                      "Terjadi kesalahan pada server"),
                );
                // Reset state tombol jika gagal
                $btn
                  .text("Daftar Sekarang")
                  .prop("disabled", false)
                  .addClass("hover:-translate-y-0.5 hover:bg-blue-700")
                  .removeClass("opacity-75 cursor-not-allowed");
              });
          } else {
            console.warn("AuthService belum dimuat.");
            setTimeout(() => {
              $btn
                .text("Daftar Sekarang")
                .prop("disabled", false)
                .addClass("hover:-translate-y-0.5 hover:bg-blue-700")
                .removeClass("opacity-75 cursor-not-allowed");
            }, 1000);
          }
        });
      });
    </script>
  </body>
</html>
