<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riwayat Peminjaman - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-200 min-h-screen font-sans bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.15),rgba(255,255,255,0))] relative"
  >
    <nav
      class="sticky top-0 z-50 bg-slate-900/70 backdrop-blur-lg border-b border-slate-700/50 shadow-lg"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold"
            >
              P
            </div>
            <h1 class="text-xl font-bold text-white">
              Perpus<span class="text-blue-500">App</span>
            </h1>
          </div>
          <div class="hidden md:flex items-center gap-8">
            <a
              href="../../index.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Beranda</a
            >
            <a
              href="loans.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Peminjamanku</a
            >
            <a href="#" class="text-blue-400 font-medium transition-colors"
              >Riwayat</a
            >
            <a
              href="fines.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Tagihan</a
            >
          </div>
          <div class="hidden md:flex items-center gap-5">
            <a href="#" class="text-right group"
              ><p id="memberName" class="text-sm font-semibold text-slate-100">
                Memuat...
              </p>
              <p id="memberCode" class="text-xs text-slate-400 uppercase">
                Profil
              </p></a
            >
          </div>
          <div class="md:hidden flex items-center">
            <button id="mobileMenuBtn" class="text-slate-300 hover:text-white">
              <svg
                class="w-7 h-7"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div
        id="mobileMenu"
        class="hidden md:hidden bg-slate-800/95 backdrop-blur-xl border-b border-slate-700"
      >
        <div class="px-4 pt-2 pb-4 space-y-1 sm:px-3">
          <a
            href="../../index.html"
            class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700"
            >Beranda</a
          >
          <a
            href="loans.html"
            class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700"
            >Peminjamanku</a
          >
          <a
            href="#"
            class="block px-3 py-2 rounded-md text-base font-medium text-blue-400 bg-slate-700/50"
            >Riwayat</a
          >
          <a
            href="fines.html"
            class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700"
            >Tagihan</a
          >
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 sm:p-8">
      <header class="mb-8">
        <h2 class="text-3xl md:text-4xl font-bold text-white mb-2">
          Riwayat Transaksi
        </h2>
        <p class="text-slate-400 text-sm md:text-base">
          Catatan seluruh peminjaman dan pengembalian yang pernah Anda lakukan.
        </p>
      </header>

      <div
        class="bg-slate-900/40 border border-slate-700/50 rounded-3xl shadow-xl backdrop-blur-xl overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead>
              <tr
                class="bg-slate-950/60 border-b border-slate-700/50 text-slate-400 text-xs uppercase tracking-wider"
              >
                <th class="px-6 py-4 font-semibold">Judul Buku</th>
                <th class="px-6 py-4 font-semibold">Tanggal Pinjam</th>
                <th class="px-6 py-4 font-semibold">Dikembalikan</th>
                <th class="px-6 py-4 font-semibold">Status</th>
              </tr>
            </thead>
            <tbody
              id="historyTableBody"
              class="text-sm divide-y divide-slate-700/50"
            >
              <tr>
                <td colspan="4" class="px-6 py-12 text-center text-blue-400">
                  Memuat riwayat...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div
        id="paginationContainer"
        class="flex justify-center items-end gap-2 mt-8 mb-4 flex-wrap"
      ></div>
    </main>

    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script src="../../Services/loanService.js"></script>

    <script>
      $(document).ready(function () {
        $("#mobileMenuBtn").on("click", () =>
          $("#mobileMenu").slideToggle("fast"),
        );
        if (typeof Middleware !== "undefined") Middleware.checkAuth();
        if (typeof AuthService !== "undefined") {
          AuthService.getProfile().done((res) => {
            if (res.success) {
              $("#memberName").text(res.data.user.name);
              $("#memberCode").text(res.data.user.memberCode);
            }
          });
        }

        let currentPage = 1;

        function fetchHistory(page = 1) {
          currentPage = page;
          $("#historyTableBody").html(
            `<tr><td colspan="4" class="px-6 py-12 text-center text-blue-400"><div class="animate-spin h-6 w-6 border-b-2 border-blue-500 mx-auto mb-2"></div>Memuat...</td></tr>`,
          );
          $("#paginationContainer").empty();

          LoanService.getLoanHistory({ page: page, limit: 10 })
            .done((res) => {
              if (res.data && res.data.loans && res.data.loans.length > 0) {
                renderTable(res.data.loans);
                if (res.pagination) renderPagination(res.pagination);
              } else {
                $("#historyTableBody").html(
                  '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-500">Belum ada riwayat transaksi.</td></tr>',
                );
              }
            })
            .fail(() =>
              $("#historyTableBody").html(
                '<tr><td colspan="4" class="px-6 py-8 text-center text-red-400">Gagal memuat riwayat.</td></tr>',
              ),
            );
        }

        function renderTable(loans) {
          const $tbody = $("#historyTableBody");
          $tbody.empty();
          const formatDate = (dateStr) =>
            dateStr
              ? new Date(dateStr).toLocaleDateString("id-ID", {
                  day: "numeric",
                  month: "short",
                  year: "numeric",
                })
              : "-";

          loans.forEach((loan) => {
            const title = loan.book?.title || "Buku Dihapus";
            const isReturned = loan.status === "returned";
            const statusHtml = isReturned
              ? `<span class="bg-slate-700/50 text-slate-300 px-2 py-1 rounded text-[10px] font-bold">SELESAI</span>`
              : `<span class="bg-blue-500/20 text-blue-400 px-2 py-1 rounded text-[10px] font-bold">AKTIF</span>`;

            $tbody.append(`
              <tr class="hover:bg-slate-800/40 transition-colors">
                <td class="px-6 py-4 font-bold text-white max-w-[250px] truncate">${title}</td>
                <td class="px-6 py-4 text-slate-400">${formatDate(loan.loanDate)}</td>
                <td class="px-6 py-4 ${isReturned ? "text-emerald-400" : "text-slate-500"} font-medium">${formatDate(loan.returnDate) || "Belum kembali"}</td>
                <td class="px-6 py-4">${statusHtml}</td>
              </tr>
            `);
          });
        }

        function renderPagination(pagination) {
          const $container = $("#paginationContainer");
          $container.empty();
          if (!pagination || pagination.totalPages <= 1) return;
          const { page, totalPages, hasNextPage, hasPrevPage } = pagination;
          let html = `<button data-page="${page - 1}" class="page-btn px-4 py-2 border rounded-xl ${!hasPrevPage ? "opacity-50 pointer-events-none" : "bg-slate-900/50 hover:bg-slate-700"}">Prev</button>`;
          for (
            let i = Math.max(1, page - 2);
            i <= Math.min(totalPages, page + 2);
            i++
          ) {
            html += `<button data-page="${i}" class="page-btn w-10 h-10 border rounded-xl font-bold transition-all ${i === page ? "bg-blue-600 text-white border-blue-500" : "bg-slate-900/50 hover:bg-slate-700"}">${i}</button>`;
          }
          html += `<button data-page="${page + 1}" class="page-btn px-4 py-2 border rounded-xl ${!hasNextPage ? "opacity-50 pointer-events-none" : "bg-slate-900/50 hover:bg-slate-700"}">Next</button>`;
          $container.append(html);
        }

        fetchHistory();
        $(document).on("click", ".page-btn", function () {
          fetchHistory($(this).data("page"));
          $("html, body").animate({ scrollTop: 0 }, 400);
        });
      });
    </script>
  </body>
</html>
