<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riwayat - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-200 min-h-screen font-sans bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.2),rgba(255,255,255,0))]"
  >
    <nav
      class="sticky top-0 z-50 bg-slate-900/70 backdrop-blur-xl border-b border-slate-700/50 shadow-lg"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold"
            >
              P
            </div>
            <h1 class="text-xl font-bold text-white tracking-wide">
              Perpus<span class="text-blue-500">App</span>
            </h1>
          </div>
          <div class="hidden md:flex items-center gap-8">
            <a
              href="../../index.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Beranda</a
            >
            <a
              href="loans.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Peminjamanku</a
            >
            <a
              href="#"
              class="text-blue-400 font-bold border-b-2 border-blue-500 pb-1"
              >Riwayat</a
            >
            <a
              href="fines.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Tagihan</a
            >
          </div>
          <div class="hidden md:flex items-center gap-5">
            <!-- REVISI: href mengarah ke profile.html -->
            <a href="profile.html" class="text-right group cursor-pointer">
              <p
                id="memberName"
                class="text-sm font-semibold text-slate-100 group-hover:text-blue-400 transition-colors"
              >
                Memuat...
              </p>
              <p
                id="memberCode"
                class="text-[10px] text-slate-400 uppercase font-mono tracking-wider group-hover:text-slate-300"
              >
                Profil Saya
              </p>
            </a>
          </div>
          <div class="md:hidden flex items-center">
            <button id="mobileMenuBtn" class="text-slate-300">
              <svg
                class="w-7 h-7"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div
        id="mobileMenu"
        class="hidden md:hidden bg-slate-900/95 backdrop-blur-xl border-b border-slate-700"
      >
        <div class="px-4 pt-2 pb-6 space-y-2">
          <a
            href="../../index.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Beranda</a
          >
          <a
            href="loans.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Peminjamanku</a
          >
          <a
            href="#"
            class="block px-4 py-3 rounded-xl bg-blue-600/20 text-blue-400 font-bold"
            >Riwayat</a
          >
          <a
            href="fines.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Tagihan</a
          >
          <a
            href="profile.html"
            class="block px-4 py-3 rounded-xl text-emerald-400 font-bold hover:bg-slate-800 border border-emerald-500/20 mt-4"
            >Profil Saya</a
          >
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 sm:p-8">
      <header class="mb-10">
        <h2 class="text-4xl font-extrabold text-white mb-2">
          Jejak <span class="text-blue-500">Literasi</span>
        </h2>
        <p class="text-slate-400">
          Log lengkap seluruh aktivitas peminjaman buku Anda dari awal
          bergabung.
        </p>
      </header>

      <div
        class="bg-slate-900/40 border border-slate-700/50 rounded-3xl shadow-2xl backdrop-blur-xl overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead>
              <tr
                class="bg-slate-950/60 border-b border-slate-700/50 text-slate-400 text-[10px] uppercase font-bold tracking-widest"
              >
                <th class="px-8 py-5">Informasi Buku</th>
                <th class="px-8 py-5">Tgl Pinjam</th>
                <th class="px-8 py-5">Tgl Kembali</th>
                <th class="px-8 py-5">Status</th>
              </tr>
            </thead>
            <tbody
              id="historyTableBody"
              class="text-sm divide-y divide-slate-800/50"
            ></tbody>
          </table>
        </div>
      </div>
      <div
        id="paginationContainer"
        class="flex justify-center items-center gap-2 mt-10 mb-8 flex-wrap"
      ></div>
    </main>

    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script src="../../Services/loanService.js"></script>

    <script>
      $(document).ready(function () {
        if (typeof Middleware !== "undefined") Middleware.checkAuth();
        if (typeof AuthService !== "undefined") {
          AuthService.getProfile().done((res) => {
            if (res.success) {
              $("#memberName").text(res.data.user.name);
              $("#memberCode").text(res.data.user.memberCode);
            }
          });
        }

        const formatDate = (d) =>
          d
            ? new Date(d).toLocaleDateString("id-ID", {
                day: "numeric",
                month: "short",
                year: "numeric",
              })
            : "-";

        function fetchHistory(page = 1) {
          $("#historyTableBody").html(
            `<tr><td colspan="4" class="px-8 py-20 text-center"><div class="animate-spin h-8 w-8 border-b-2 border-blue-500 mx-auto"></div></td></tr>`,
          );
          LoanService.getLoanHistory({ page: page, limit: 10 }).done((res) => {
            const $tbody = $("#historyTableBody");
            $tbody.empty();
            if (res.data?.loans?.length > 0) {
              res.data.loans.forEach((loan) => {
                const isRet = loan.status === "returned";
                $tbody.append(
                  `<tr class="hover:bg-white/5 transition-colors cursor-pointer" onclick="window.location.href='loan-detail.html?id=${loan._id}'"><td class="px-8 py-5"><p class="font-bold text-white truncate max-w-[300px]">${loan.book?.title || "Dihapus"}</p><p class="text-[10px] text-slate-500 font-mono mt-1">ID: ${loan._id}</p></td><td class="px-8 py-5 text-slate-400 font-medium">${formatDate(loan.loanDate)}</td><td class="px-8 py-5 ${isRet ? "text-emerald-400" : "text-slate-600"} font-bold">${isRet ? formatDate(loan.returnDate) : "Masih dipinjam"}</td><td class="px-8 py-5"><span class="px-3 py-1 rounded-lg text-[10px] font-bold ${isRet ? "bg-slate-800 text-slate-400" : "bg-blue-500/10 text-blue-400 border border-blue-500/20"} uppercase">${isRet ? "Selesai" : "Aktif"}</span></td></tr>`,
                );
              });
              renderPagination(res.pagination);
            } else {
              $tbody.html(
                '<tr><td colspan="4" class="px-8 py-20 text-center text-slate-500">Belum ada riwayat.</td></tr>',
              );
            }
          });
        }

        function renderPagination(pagination) {
          const $container = $("#paginationContainer");
          $container.empty();
          const { page, totalPages, hasNextPage, hasPrevPage } = pagination;
          if (totalPages <= 1) return;
          let html = `<button data-page="${page - 1}" class="page-btn px-5 py-2 bg-slate-900 border border-slate-700 rounded-xl transition-all ${!hasPrevPage ? "opacity-30 pointer-events-none" : "hover:bg-slate-800"}">Prev</button>`;
          for (
            let i = Math.max(1, page - 2);
            i <= Math.min(totalPages, page + 2);
            i++
          ) {
            html += `<button data-page="${i}" class="page-btn w-10 h-10 border rounded-xl font-bold transition-all ${i === page ? "bg-blue-600 text-white border-blue-400 shadow-lg shadow-blue-600/30" : "bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800"}">${i}</button>`;
          }
          html += `<button data-page="${page + 1}" class="page-btn px-5 py-2 bg-slate-900 border border-slate-700 rounded-xl transition-all ${!hasNextPage ? "opacity-30 pointer-events-none" : "hover:bg-slate-800"}">Next</button>`;
          $container.append(html);
        }

        fetchHistory();
        $(document).on("click", ".page-btn", function () {
          fetchHistory($(this).data("page"));
          $("html, body").animate({ scrollTop: 0 }, 400);
        });
      });
    </script>
  </body>
</html>
