<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peminjamanku - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-200 min-h-screen font-sans bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.2),rgba(255,255,255,0))]"
  >
    <nav
      class="sticky top-0 z-50 bg-slate-900/70 backdrop-blur-xl border-b border-slate-700/50 shadow-lg"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold"
            >
              P
            </div>
            <h1 class="text-xl font-bold text-white tracking-wide">
              Perpus<span class="text-blue-500">App</span>
            </h1>
          </div>
          <div class="hidden md:flex items-center gap-8">
            <a
              href="../../index.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Beranda</a
            >
            <a
              href="#"
              class="text-blue-400 font-bold border-b-2 border-blue-500 pb-1"
              >Peminjamanku</a
            >
            <a
              href="history.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Riwayat</a
            >
            <a
              href="fines.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Tagihan</a
            >
          </div>
          <div class="hidden md:flex items-center gap-5">
            <!-- REVISI: href mengarah ke profile.html -->
            <a href="profile.html" class="text-right group cursor-pointer">
              <p
                id="memberName"
                class="text-sm font-semibold text-slate-100 group-hover:text-blue-400 transition-colors"
              >
                Memuat...
              </p>
              <p
                id="memberCode"
                class="text-[10px] text-slate-400 uppercase font-mono tracking-wider group-hover:text-slate-300"
              >
                Profil Saya
              </p>
            </a>
          </div>
          <div class="md:hidden flex items-center">
            <button id="mobileMenuBtn" class="text-slate-300">
              <svg
                class="w-7 h-7"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div
        id="mobileMenu"
        class="hidden md:hidden bg-slate-900/95 backdrop-blur-xl border-b border-slate-700"
      >
        <div class="px-4 pt-2 pb-6 space-y-2">
          <a
            href="../../index.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Beranda</a
          >
          <a
            href="#"
            class="block px-4 py-3 rounded-xl bg-blue-600/20 text-blue-400 font-bold"
            >Peminjamanku</a
          >
          <a
            href="history.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Riwayat</a
          >
          <a
            href="fines.html"
            class="block px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800"
            >Tagihan</a
          >
          <a
            href="profile.html"
            class="block px-4 py-3 rounded-xl text-emerald-400 font-bold hover:bg-slate-800 border border-emerald-500/20 mt-4"
            >Profil Saya</a
          >
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 sm:p-8">
      <header class="mb-10 text-center sm:text-left">
        <h2 class="text-4xl font-extrabold text-white mb-2">
          Sedang <span class="text-blue-500">Dipinjam</span>
        </h2>
        <p class="text-slate-400">
          Pastikan untuk mengembalikan buku tepat waktu untuk menghindari sanksi
          denda.
        </p>
      </header>
      <div
        id="activeLoansContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </main>

    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script src="../../Services/loanService.js"></script>

    <script>
      $(document).ready(function () {
        $("#mobileMenuBtn").on("click", () =>
          $("#mobileMenu").slideToggle("fast"),
        );
        if (typeof Middleware !== "undefined") Middleware.checkAuth();
        if (typeof AuthService !== "undefined") {
          AuthService.getProfile().done((res) => {
            if (res.success) {
              $("#memberName").text(res.data.user.name);
              $("#memberCode").text(res.data.user.memberCode);
            }
          });
        }

        function fetchLoans() {
          $("#activeLoansContainer").html(
            `<div class="col-span-full flex justify-center py-20"><div class="animate-spin h-12 w-12 border-b-2 border-blue-500 rounded-full"></div></div>`,
          );
          LoanService.getMyLoans({ status: "borrowed" })
            .done((res) => {
              if (res.data?.loans?.length > 0) renderLoans(res.data.loans);
              else
                $("#activeLoansContainer").html(
                  `<div class="col-span-full text-center py-20 bg-white/5 rounded-3xl border border-white/10 shadow-2xl"><div class="text-6xl mb-6">📚</div><h3 class="text-2xl font-bold text-white mb-2">Kosong</h3><p class="text-slate-500">Anda tidak memiliki pinjaman aktif.</p></div>`,
                );
            })
            .fail(() =>
              $("#activeLoansContainer").html(
                '<p class="text-red-400 text-center py-10 col-span-full">Gagal memuat data.</p>',
              ),
            );
        }

        function renderLoans(loans) {
          const $container = $("#activeLoansContainer");
          $container.empty();
          loans.forEach((loan) => {
            const isOverdue = loan.lateDays > 0;
            const dueStr = new Date(loan.dueDate).toLocaleDateString("id-ID", {
              day: "numeric",
              month: "long",
              year: "numeric",
            });
            $container.append(`
              <div onclick="window.location.href='loan-detail.html?id=${loan._id}'" class="bg-slate-900/40 border ${isOverdue ? "border-red-500/50" : "border-blue-500/20"} rounded-3xl p-6 hover:bg-slate-900/60 transition-all cursor-pointer group shadow-xl">
                <div class="flex justify-between items-start mb-6">
                  <span class="px-3 py-1 rounded-lg text-[10px] font-bold border ${isOverdue ? "bg-red-500/10 text-red-400 border-red-500/30 animate-pulse" : "bg-blue-500/10 text-blue-400 border-blue-500/30"} uppercase">${isOverdue ? "Terlambat" : "Aktif"}</span>
                  <span class="text-[10px] text-slate-500 font-mono">ID: ${loan._id}</span>
                </div>
                <h3 class="font-bold text-white text-xl line-clamp-2 mb-4 group-hover:text-blue-400 transition-colors">${loan.book?.title || "Buku Dihapus"}</h3>
                <div class="bg-slate-950/80 rounded-2xl p-4 border border-slate-800">
                  <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Tenggat Pengembalian</p>
                  <p class="text-sm font-bold ${isOverdue ? "text-red-400" : "text-emerald-400"}">${dueStr}</p>
                </div>
              </div>
            `);
          });
        }
        fetchLoans();
      });
    </script>
  </body>
</html>
