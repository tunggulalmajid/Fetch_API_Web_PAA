<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peminjamanku - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-200 min-h-screen font-sans bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.15),rgba(255,255,255,0))] relative"
  >
    <nav
      class="sticky top-0 z-50 bg-slate-900/70 backdrop-blur-lg border-b border-slate-700/50 shadow-lg"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <div
              class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold"
            >
              P
            </div>
            <h1 class="text-xl font-bold text-white">
              Perpus<span class="text-blue-500">App</span>
            </h1>
          </div>
          <div class="hidden md:flex items-center gap-8">
            <a
              href="../../index.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Beranda</a
            >
            <a href="#" class="text-blue-400 font-medium transition-colors"
              >Peminjamanku</a
            >
            <a
              href="history.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Riwayat</a
            >
            <a
              href="fines.html"
              class="text-slate-300 hover:text-white transition-colors"
              >Tagihan</a
            >
          </div>
          <div class="hidden md:flex items-center gap-5">
            <a href="#" class="text-right group"
              ><p id="memberName" class="text-sm font-semibold text-slate-100">
                Memuat...
              </p>
              <p id="memberCode" class="text-xs text-slate-400 uppercase">
                Profil
              </p></a
            >
          </div>
          <div class="md:hidden flex items-center">
            <button id="mobileMenuBtn" class="text-slate-300 hover:text-white">
              <svg
                class="w-7 h-7"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div
        id="mobileMenu"
        class="hidden md:hidden bg-slate-800/95 backdrop-blur-xl border-b border-slate-700"
      >
        <div class="px-4 pt-2 pb-4 space-y-1 sm:px-3">
          <a
            href="../../index.html"
            class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700"
            >Beranda</a
          >
          <a
            href="#"
            class="block px-3 py-2 rounded-md text-base font-medium text-blue-400 bg-slate-700/50"
            >Peminjamanku</a
          >
          <a
            href="history.html"
            class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700"
            >Riwayat</a
          >
          <a
            href="fines.html"
            class="block px-3 py-2 rounded-md text-base font-medium text-slate-300 hover:text-white hover:bg-slate-700"
            >Tagihan</a
          >
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 sm:p-8">
      <header class="mb-8">
        <h2 class="text-3xl md:text-4xl font-bold text-white mb-2">
          Buku Sedang Dipinjam
        </h2>
        <p class="text-slate-400 text-sm md:text-base">
          Kembalikan buku sebelum tenggat waktu untuk menghindari denda.
        </p>
      </header>

      <div
        id="activeLoansContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <div class="col-span-full flex justify-center py-12">
          <div
            class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"
          ></div>
        </div>
      </div>
    </main>

    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>
    <script src="../../Services/loanService.js"></script>

    <script>
      $(document).ready(function () {
        $("#mobileMenuBtn").on("click", () =>
          $("#mobileMenu").slideToggle("fast"),
        );
        if (typeof Middleware !== "undefined") Middleware.checkAuth();
        if (typeof AuthService !== "undefined") {
          AuthService.getProfile().done((res) => {
            if (res.success) {
              $("#memberName").text(res.data.user.name);
              $("#memberCode").text(res.data.user.memberCode);
            }
          });
        }

        function fetchActiveLoans() {
          $("#activeLoansContainer").html(
            `<div class="col-span-full flex justify-center py-12"><div class="animate-spin h-12 w-12 border-b-2 border-blue-500 rounded-full"></div></div>`,
          );
          LoanService.getMyLoans({ status: "borrowed" })
            .done((res) => {
              const loans = res.data?.loans || [];
              if (loans.length > 0) renderLoans(loans);
              else
                $("#activeLoansContainer").html(
                  `<div class="col-span-full text-center py-16 bg-slate-900/40 rounded-3xl border border-slate-700/50"><div class="text-6xl mb-4">📚</div><h3 class="text-xl font-bold text-white">Tidak ada buku yang sedang dipinjam</h3></div>`,
                );
            })
            .fail(() =>
              $("#activeLoansContainer").html(
                '<p class="text-red-400 col-span-full text-center py-10">Gagal memuat data.</p>',
              ),
            );
        }

        function renderLoans(loans) {
          const $container = $("#activeLoansContainer");
          $container.empty();
          loans.forEach((loan) => {
            const bookTitle = loan.book?.title || "Buku Dihapus";
            const isOverdue = loan.lateDays > 0;
            const dueStr = new Date(loan.dueDate).toLocaleDateString("id-ID", {
              day: "numeric",
              month: "long",
              year: "numeric",
            });

            $container.append(`
              <div class="bg-slate-900/40 border ${isOverdue ? "border-red-500/50" : "border-blue-500/20"} rounded-2xl p-6 flex flex-col relative overflow-hidden group">
                <div class="flex justify-between items-start mb-4 relative z-10">
                  <span class="px-2.5 py-1 rounded-md text-[10px] uppercase font-bold border ${isOverdue ? "bg-red-500/10 text-red-400 border-red-500/20 animate-pulse" : "bg-blue-500/10 text-blue-400 border-blue-500/20"}">${isOverdue ? "Terlambat" : "Aktif"}</span>
                  <span class="text-xs text-slate-500 font-mono">ID: ${loan._id}</span>
                </div>
                <h3 class="font-bold text-white text-lg line-clamp-2 mb-4">${bookTitle}</h3>
                <div class="bg-slate-950/50 rounded-xl p-4 border border-slate-800 mb-4">
                  <div class="flex justify-between items-center"><span class="text-xs text-slate-500">Tenggat Waktu</span><span class="text-sm font-bold ${isOverdue ? "text-red-400" : "text-emerald-400"}">${dueStr}</span></div>
                </div>
                <!-- Logika pengembalian disimulasikan dari klik ini (Bisa diarahkan ke detail page) -->
                <button class="btn-return w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition-all mt-auto" data-id="${loan._id}">Kembalikan Buku</button>
              </div>
            `);
          });
        }

        $(document).on("click", ".btn-return", function () {
          if (confirm("Yakin ingin mengembalikan buku ini sekarang?")) {
            const $btn = $(this);
            $btn.prop("disabled", true).html("Proses...");
            LoanService.returnBook($(this).data("id"))
              .done(() => {
                alert("Sukses dikembalikan!");
                fetchActiveLoans();
              })
              .fail((err) => {
                alert("Gagal: " + err.responseJSON?.message);
                $btn.prop("disabled", false).html("Kembalikan Buku");
              });
          }
        });

        fetchActiveLoans();
      });
    </script>
  </body>
</html>
