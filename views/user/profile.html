<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Saya - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <!-- Latar belakang gelap dengan radial gradient senada dengan Dashboard -->
  <body
    class="bg-slate-950 text-slate-200 min-h-screen font-sans bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(30,58,138,0.15),rgba(255,255,255,0))]"
  >
    <!-- Navbar (Glassmorphism) -->
    <nav
      class="sticky top-0 z-50 bg-slate-900/70 backdrop-blur-lg border-b border-slate-700/50 shadow-lg px-6 py-4 flex justify-between items-center"
    >
      <a
        href="../../index.html"
        class="text-blue-400 hover:text-blue-300 font-bold flex items-center gap-2 transition-colors group"
      >
        <span class="transform group-hover:-translate-x-1 transition-transform"
          >←</span
        >
        Kembali ke Beranda
      </a>
      <h1 class="text-xl font-bold text-white tracking-wide">
        Profil <span class="text-blue-500">Pengguna</span>
      </h1>
    </nav>

    <main class="max-w-4xl mx-auto p-6 sm:p-8 space-y-8 mt-4">
      <!-- Section 1: Informasi Profil -->
      <section
        class="bg-white/5 border border-white/10 rounded-3xl shadow-2xl backdrop-blur-xl overflow-hidden"
      >
        <!-- Header Profil -->
        <div
          class="relative p-8 text-center border-b border-slate-700/50 bg-slate-900/40"
        >
          <div
            class="w-28 h-28 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl mx-auto mb-5 flex items-center justify-center text-4xl font-bold text-white shadow-lg shadow-blue-600/30 transform rotate-3 hover:rotate-0 transition-transform duration-300"
            id="initials"
          >
            --
          </div>
          <h2 id="profileName" class="text-3xl font-bold text-white mb-1">
            Memuat...
          </h2>
          <p
            id="profileRole"
            class="text-blue-400 uppercase tracking-widest text-sm font-bold"
          >
            ---
          </p>
        </div>

        <!-- Detail Profil -->
        <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8 bg-slate-900/20">
          <div class="space-y-1">
            <label
              class="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                ></path>
              </svg>
              Email
            </label>
            <p id="profileEmail" class="text-slate-200 font-medium text-lg">
              ---
            </p>
          </div>
          <div class="space-y-1">
            <label
              class="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
                ></path>
              </svg>
              Kode Anggota
            </label>
            <p
              id="profileCode"
              class="text-blue-400 font-bold font-mono text-lg bg-blue-500/10 px-3 py-1 rounded-lg inline-block"
            >
              ---
            </p>
          </div>
          <div class="space-y-1">
            <label
              class="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"
                ></path>
              </svg>
              Batas Pinjam
            </label>
            <p id="profileLimit" class="text-slate-200 font-medium text-lg">
              ---
            </p>
          </div>
          <div class="space-y-1">
            <label
              class="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                ></path>
              </svg>
              Total Dipinjam
            </label>
            <p id="profileBorrowed" class="text-slate-200 font-medium text-lg">
              ---
            </p>
          </div>
        </div>
      </section>

      <!-- Section 2: Form Ganti Password -->
      <section
        class="bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl backdrop-blur-xl"
      >
        <div class="flex items-center gap-4 mb-8">
          <div
            class="w-12 h-12 bg-blue-500/20 text-blue-400 rounded-xl flex items-center justify-center border border-blue-500/30"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              ></path>
            </svg>
          </div>
          <div>
            <h3 class="text-xl font-bold text-white">Keamanan Akun</h3>
            <p class="text-sm text-slate-400 mt-1">
              Perbarui password Anda secara berkala untuk menjaga keamanan.
            </p>
          </div>
        </div>

        <form
          id="formUpdatePassword"
          class="grid grid-cols-1 md:grid-cols-2 gap-6"
        >
          <div class="md:col-span-1">
            <label class="block text-sm font-semibold text-slate-300 mb-2"
              >Password Saat Ini</label
            >
            <input
              type="password"
              id="currentPassword"
              class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
              placeholder="Masukkan password saat ini"
              required
            />
          </div>
          <div class="md:col-span-1">
            <label class="block text-sm font-semibold text-slate-300 mb-2"
              >Password Baru</label
            >
            <input
              type="password"
              id="newPassword"
              class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
              placeholder="Masukkan password baru"
              required
            />
          </div>
          <div class="md:col-span-2 flex justify-end mt-4">
            <button
              type="submit"
              id="btnUpdatePassword"
              class="w-full md:w-auto bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-600/30 active:scale-95 transition-all"
            >
              Update Password
            </button>
          </div>
        </form>
      </section>
    </main>

    <!-- Scripts: Path disesuaikan (naik 2 tingkat dari views/user/) -->
    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>

    <script>
      $(document).ready(function () {
        // 1. Proteksi Halaman
        if (typeof Middleware !== "undefined" && Middleware.checkAuth()) {
          // 2. Load Data Profil dari API /auth/me
          if (typeof AuthService !== "undefined") {
            AuthService.getProfile()
              .done(function (res) {
                if (res.success) {
                  const user = res.data.user;

                  // Isi data ke UI
                  $("#profileName").text(user.name);
                  $("#profileRole").text(user.role);
                  $("#profileEmail").text(user.email);
                  $("#profileCode").text(user.memberCode || "-");
                  $("#profileLimit").text((user.maxBorrowLimit || 0) + " Buku");
                  $("#profileBorrowed").text(
                    (user.totalBorrowed || 0) + " Buku",
                  );

                  // Buat Inisial Nama (Misal: Tunggul Majid -> TM)
                  const initials = user.name
                    .split(" ")
                    .map((n) => n[0])
                    .join("")
                    .substring(0, 2)
                    .toUpperCase();
                  $("#initials").text(initials);
                }
              })
              .fail(function (err) {
                if (err.status === 401) {
                  AuthService.clearSession();
                  window.location.href = "../auth/login.html";
                }
              });
          }
        }

        // 3. Logika Update Password
        $("#formUpdatePassword").on("submit", function (e) {
          e.preventDefault();

          const $btn = $("#btnUpdatePassword");
          $btn
            .prop("disabled", true)
            .text("Memproses...")
            .addClass("opacity-75 cursor-not-allowed");

          const payload = {
            currentPassword: $("#currentPassword").val(),
            newPassword: $("#newPassword").val(),
          };

          if (typeof AuthService !== "undefined") {
            AuthService.updatePassword(payload)
              .done(function (res) {
                alert("Password berhasil diperbarui!");
                $("#formUpdatePassword")[0].reset();
              })
              .fail(function (err) {
                const msg = err.responseJSON
                  ? err.responseJSON.message
                  : "Gagal mengupdate password";
                alert("Error: " + msg);
              })
              .always(function () {
                $btn
                  .prop("disabled", false)
                  .text("Update Password")
                  .removeClass("opacity-75 cursor-not-allowed");
              });
          } else {
            setTimeout(() => {
              $btn
                .prop("disabled", false)
                .text("Update Password")
                .removeClass("opacity-75 cursor-not-allowed");
            }, 1000);
          }
        });
      });
    </script>
  </body>
</html>
