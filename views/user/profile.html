<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Saya - PerpusApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <nav
      class="bg-white shadow-sm px-8 py-4 flex justify-between items-center sticky top-0 z-10"
    >
      <a
        href="../../index.html"
        class="text-blue-600 font-bold flex items-center gap-2"
      >
        <span>←</span> Kembali ke Beranda
      </a>
      <h1 class="text-xl font-bold text-slate-800">Profil Pengguna</h1>
    </nav>

    <main class="max-w-4xl mx-auto p-8 space-y-8">
      <!-- Section 1: Informasi Profil -->
      <section
        class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"
      >
        <div class="bg-blue-600 p-6 text-white text-center">
          <div
            class="w-24 h-24 bg-blue-400 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl font-bold border-4 border-white/30"
            id="initials"
          >
            --
          </div>
          <h2 id="profileName" class="text-2xl font-bold">Memuat...</h2>
          <p
            id="profileRole"
            class="text-blue-100 uppercase tracking-widest text-xs font-bold mt-1"
          >
            ---
          </p>
        </div>

        <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="text-xs font-bold text-slate-400 uppercase"
              >Email</label
            >
            <p id="profileEmail" class="text-slate-700 font-medium">---</p>
          </div>
          <div>
            <label class="text-xs font-bold text-slate-400 uppercase"
              >Kode Anggota</label
            >
            <p id="profileCode" class="text-slate-700 font-medium font-mono">
              ---
            </p>
          </div>
          <div>
            <label class="text-xs font-bold text-slate-400 uppercase"
              >Batas Pinjam</label
            >
            <p id="profileLimit" class="text-slate-700 font-medium">---</p>
          </div>
          <div>
            <label class="text-xs font-bold text-slate-400 uppercase"
              >Total Dipinjam</label
            >
            <p id="profileBorrowed" class="text-slate-700 font-medium">---</p>
          </div>
        </div>
      </section>

      <!-- Section 2: Form Ganti Password -->
      <section
        class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8"
      >
        <div class="flex items-center gap-3 mb-6">
          <div
            class="w-10 h-10 bg-orange-100 text-orange-600 rounded-lg flex items-center justify-center"
          >
            🔒
          </div>
          <div>
            <h3 class="text-lg font-bold text-slate-800">Keamanan Akun</h3>
            <p class="text-sm text-slate-500">
              Perbarui password Anda secara berkala.
            </p>
          </div>
        </div>

        <form
          id="formUpdatePassword"
          class="grid grid-cols-1 md:grid-cols-2 gap-4"
        >
          <div class="md:col-span-1">
            <label class="block text-sm font-semibold text-slate-700 mb-1"
              >Password Saat Ini</label
            >
            <input
              type="password"
              id="currentPassword"
              class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
              required
            />
          </div>
          <div class="md:col-span-1">
            <label class="block text-sm font-semibold text-slate-700 mb-1"
              >Password Baru</label
            >
            <input
              type="password"
              id="newPassword"
              class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"
              required
            />
          </div>
          <div class="md:col-span-2 flex justify-end mt-2">
            <button
              type="submit"
              id="btnUpdatePassword"
              class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition"
            >
              Update Password
            </button>
          </div>
        </form>
      </section>
    </main>

    <!-- Scripts: Path disesuaikan (naik 2 tingkat dari views/user/) -->
    <script src="../../middleware/middleware.js"></script>
    <script src="../../Services/apiService.js"></script>
    <script src="../../Services/authService.js"></script>

    <script>
      $(document).ready(function () {
        // 1. Proteksi Halaman
        if (Middleware.checkAuth()) {
          // 2. Load Data Profil dari API /auth/me
          AuthService.getProfile()
            .done(function (res) {
              if (res.success) {
                const user = res.data.user;

                // Isi data ke UI
                $("#profileName").text(user.name);
                $("#profileRole").text(user.role);
                $("#profileEmail").text(user.email);
                $("#profileCode").text(user.memberCode);
                $("#profileLimit").text(user.maxBorrowLimit + " Buku");
                $("#profileBorrowed").text(user.totalBorrowed + " Buku");

                // Buat Inisial Nama (Misal: Tunggul Majid -> TM)
                const initials = user.name
                  .split(" ")
                  .map((n) => n[0])
                  .join("")
                  .substring(0, 2);
                $("#initials").text(initials);
              }
            })
            .fail(function (err) {
              if (err.status === 401) {
                AuthService.clearSession();
                window.location.href = "../auth/login.html";
              }
            });
        }

        // 3. Logika Update Password
        $("#formUpdatePassword").on("submit", function (e) {
          e.preventDefault();

          const $btn = $("#btnUpdatePassword");
          $btn.prop("disabled", true).text("Memproses...");

          const payload = {
            currentPassword: $("#currentPassword").val(),
            newPassword: $("#newPassword").val(),
          };

          AuthService.updatePassword(payload)
            .done(function (res) {
              alert("Password berhasil diperbarui!");
              $("#formUpdatePassword")[0].reset();
            })
            .fail(function (err) {
              const msg = err.responseJSON
                ? err.responseJSON.message
                : "Gagal mengupdate password";
              alert("Error: " + msg);
            })
            .always(function () {
              $btn.prop("disabled", false).text("Update Password");
            });
        });
      });
    </script>
  </body>
</html>
